name: Bump @empoweredvote/ev-ui

on:
  repository_dispatch:
    types: [ev-ui-published]
  workflow_dispatch:
    inputs:
      version:
        description: 'ev-ui version to bump to'
        required: true
      bump_type:
        description: 'patch | minor | major'
        required: true
        default: 'patch'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Mint installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Resolve inputs
        id: inputs
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          BUMP="${{ github.event.client_payload.bump_type || inputs.bump_type }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "branch=chore/bump-ev-ui-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get GitHub App user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          USER_ID=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          echo "user-id=$USER_ID" >> "$GITHUB_OUTPUT"

      - name: Configure git as GitHub App bot
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Create branch
        run: git checkout -b "${{ steps.inputs.outputs.branch }}"

      - name: Update ev-ui to target version
        run: npm install @empoweredvote/ev-ui@${{ steps.inputs.outputs.version }} --save-exact=false

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump @empoweredvote/ev-ui to ${{ steps.inputs.outputs.version }}"
          git push -u origin "${{ steps.inputs.outputs.branch }}"

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ steps.inputs.outputs.branch }}" \
            --title "chore: bump @empoweredvote/ev-ui to ${{ steps.inputs.outputs.version }}" \
            --body "Automated bump triggered by ev-ui publish. Bump type: ${{ steps.inputs.outputs.bump_type }}.")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for patch/minor bumps
        if: steps.changes.outputs.changed == 'true' && (steps.inputs.outputs.bump_type == 'patch' || steps.inputs.outputs.bump_type == 'minor')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge "${{ steps.pr.outputs.pr_url }}" --auto --squash
